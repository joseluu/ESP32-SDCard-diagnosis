; PlatformIO project for the ESP32 SD-Card Diagnosis tool.
; Target: CYD ESP32-2432S032C (classic ESP32, CH340 USB-serial).
; Framework: ESP-IDF 5.x (raw sdmmc/sdspi access for SSR/CMD6).
;
; The board exposes its micro-SD slot on a dedicated SPI bus (not the TFT bus):
;   CS=GPIO5  MOSI=GPIO23  MISO=GPIO19  SCK=GPIO18
; Pins are overridable in main/config.h.

[platformio]
; This is a native ESP-IDF project: sources live in main/ (not src/).
src_dir = main

[env:cyd_esp32]
platform = espressif32
board = esp32dev
framework = espidf

monitor_speed = 115200
monitor_port = COM7
upload_port = COM7
upload_speed = 921600

; Keep the build deterministic; console on UART0 (the CH340 USB-serial).
build_flags =
    -DCORE_DEBUG_LEVEL=0

; Destructive write tests are OFF by default (safety model in README §"Safety model").
; To enable them, add: -DCONFIG_SDDIAG_ALLOW_DESTRUCTIVE=1
